{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Quiz System{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Online Quiz Management System for teachers and students{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}?v={% now 'U' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
    <div class="toast-container" id="toast-container"></div>
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
    {% if messages %}
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            {% for message in messages %}
            showToast('{{ message|escapejs }}', '{{ message.tags|default:"info" }}');
            {% endfor %}
        });
    </script>
    {% endif %}
</body>
</html>
